<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo compare</title>
    <link rel="stylesheet" href="./style.css" type="text/css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Image Comparison</h1>

            <div class="controls">
                <div class="input-group">
                    <label>Photo 1</label>
                    <input accept="image/*" type="file" id="image1">
                </div>

                <div class="input-group">
                    <label>Photo 2</label>
                    <input accept="image/*" type="file" id="image2">
                </div>

                <div class="input-group">
                    <label for="opacitySlider">
                        Overlay Opacity
                        <span id="opacityValue">50%</span>
                    </label>

                    <input
                        type="range"
                        id="opacitySlider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="0.5">
                </div>
            </div>

            <div class="photo">
                <img id="photo1">
                <img id="photo2">
            </div>
        </div>
    </div>
</body>
</html>
