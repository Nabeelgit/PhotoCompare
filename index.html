<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Comparison Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Image Comparison</h1>

        <div class="controls">

            <!-- Image 1 -->
            <div class="input-group">

                <label>Photo 1</label>
                <input type="file" id="image1" accept="image/*">

                <div class="dimension-controls" id="dimensions1">

                    <div class="dimension-row">
                        <label for="widthSlider1">Width</label>

                        <input
                            type="range"
                            id="widthSlider1"
                            min="1"
                            max="4000"
                            value="1000">

                        <input
                            type="number"
                            id="widthInput1"
                            min="1"
                            value="1000">
                    </div>

                    <div class="dimension-row">
                        <label for="heightSlider1">Height</label>

                        <input
                            type="range"
                            id="heightSlider1"
                            min="1"
                            max="4000"
                            value="1000">

                        <input
                            type="number"
                            id="heightInput1"
                            min="1"
                            value="1000">
                    </div>

                </div>

            </div>

            <!-- Image 2 -->
            <div class="input-group">

                <label>Photo 2</label>
                <input type="file" id="image2" accept="image/*">

                <div class="dimension-controls" id="dimensions2">

                    <div class="dimension-row">
                        <label for="widthSlider2">Width</label>

                        <input
                            type="range"
                            id="widthSlider2"
                            min="1"
                            max="4000"
                            value="1000">

                        <input
                            type="number"
                            id="widthInput2"
                            min="1"
                            value="1000">
                    </div>

                    <div class="dimension-row">
                        <label for="heightSlider2">Height</label>

                        <input
                            type="range"
                            id="heightSlider2"
                            min="1"
                            max="4000"
                            value="1000">

                        <input
                            type="number"
                            id="heightInput2"
                            min="1"
                            value="1000">
                    </div>

                </div>

            </div>

            <!-- Opacity -->
            <div class="input-group">

                <label for="opacitySlider">
                    Overlay Opacity
                    <span id="opacityValue">50%</span>
                </label>

                <input
                    type="range"
                    id="opacitySlider"
                    min="0"
                    max="1"
                    step="0.01"
                    value="0.5">

            </div>

        </div>

        <div class="photo">
            <img id="photo1" draggable="false">
            <img id="photo2" draggable="false">
        </div>

    </div>

</div>

</body>
</html>
